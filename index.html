<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic School Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-section { background: var(--primary-color); color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .subject-card { border-left: 5px solid #3498db; }
        .grade-badge { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="header-section text-center">
        <h1 id="schoolName">Loading School...</h1>
        <p id="academicYear">Year: --</p>
    </div>

    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Admission Number</label>
                <input type="text" id="admNo" class="form-control" placeholder="Enter & hit Search" onchange="searchStudent()">
            </div>
            <div class="col-md-4">
                <label class="form-label">Student Name</label>
                <input type="text" id="stuName" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label">Roll No</label>
                <input type="text" id="rollNo" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label">Class/Sec</label>
                <select id="classSec" class="form-select">
                    <option value="8-A">8-A</option>
                    <option value="8-B">8-B</option>
                </select>
            </div>
        </div>
    </div>

    <div id="subjectsContainer" class="row">
        </div>

    <div class="card p-4 bg-light">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <h4>Total: <span id="displayTotal">0</span></h4>
            </div>
            <div class="col-md-4 text-center">
                <h4>Percentage: <span id="displayPercent">0%</span></h4>
            </div>
            <div class="col-md-4 text-center">
                <h4>Grade: <span id="displayGrade" class="badge bg-success grade-badge">-</span></h4>
            </div>
        </div>
        <button id="saveBtn" class="btn btn-primary btn-lg mt-4 w-100" onclick="submitData()">Save Record to Google Sheet</button>
    </div>
</div>

<script>
    // Paste your Google Web App URL here
   <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPpYH6_BGZhIa0O3Cu8keJxArC0jYxwdgQ-0shIzBHjfznjIxP6b6YuhKoSzewwmtC1g/exec?action=getConfig"; 
    let configData = {};

    async function init() {
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getConfig`);
            const config = await res.json();
            configData = config;
            
            document.getElementById('schoolName').innerText = config.School_Name || "School Name";
            document.getElementById('academicYear').innerText = `Session: ${config.Academic_Year || "--"}`;
            
            // Subjects load karna
            if(config.Subjects) {
                setupSubjects(config.Subjects, config.Competencies);
            }
        } catch(e) { console.error("Loading Error:", e); }
    }

    function setupSubjects(subs, comps) {
        const container = document.getElementById('subjectsContainer');
        container.innerHTML = ""; // Reset container
        const subjects = subs.split(',');
        const competencies = comps ? comps.split(',') : [];

        subjects.forEach(sub => {
            let compHTML = '';
            competencies.forEach(c => {
                compHTML += `
                    <div class="col-6 mb-2">
                        <label class="small text-muted">${c.trim()}</label>
                        <div class="input-group input-group-sm">
                            <input type="number" class="form-control comp-input" data-sub="${sub.trim()}" placeholder="Obt" oninput="calculateResults()">
                            <span class="input-group-text">/</span>
                            <input type="number" class="form-control comp-max-input" value="10" style="max-width:50px;" oninput="calculateResults()">
                        </div>
                    </div>`;
            });

            container.innerHTML += `
                <div class="col-md-6 mb-4">
                    <div class="card p-3 subject-card">
                        <h5 class="border-bottom pb-2">${sub.trim()}</h5>
                        <div class="mb-3 p-2 bg-light rounded" style="border: 1px dashed #ccc;">
                            <label class="small fw-bold">Theory Full Marks:</label>
                            <input type="number" class="form-control form-control-sm theory-max-input" value="80" oninput="calculateResults()">
                        </div>
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="fw-bold text-primary">Theory Obtained</label>
                                <input type="number" class="form-control theory-input" data-sub="${sub.trim()}" oninput="calculateResults()">
                            </div>
                            ${compHTML}
                        </div>
                    </div>
                </div>`;
        });
    }

    async function searchStudent() {
        const id = document.getElementById('admNo').value;
        if(!id) return;
        const res = await fetch(`${WEB_APP_URL}?action=search&id=${id}`);
        const data = await res.json();
        if(data.found) {
            document.getElementById('stuName').value = data.name;
            document.getElementById('rollNo').value = data.roll;
        } else {
            alert("Student not found!");
        }
    }

    function calculateResults() {
        let grandTotalObtained = 0;
        let grandTotalMax = 0;

        document.querySelectorAll('.subject-card').forEach(card => {
            // Theory
            let tObt = Number(card.querySelector('.theory-input').value) || 0;
            let tMax = Number(card.querySelector('.theory-max-input').value) || 0;
            
            // Competencies
            let cObt = 0;
            let cMax = 0;
            let cInputs = card.querySelectorAll('.comp-input');
            let cMaxInputs = card.querySelectorAll('.comp-max-input');

            cInputs.forEach((input, index) => {
                cObt += Number(input.value) || 0;
                cMax += Number(cMaxInputs[index].value) || 0;
            });

            grandTotalObtained += (tObt + cObt);
            grandTotalMax += (tMax + cMax);
        });

        let percent = (grandTotalMax > 0) ? (grandTotalObtained / grandTotalMax) * 100 : 0;
        
        document.getElementById('displayTotal').innerText = grandTotalObtained + " / " + grandTotalMax;
        document.getElementById('displayPercent').innerText = percent.toFixed(2) + "%";
        
        let grade = (percent >= 33) ? "Pass" : "Fail";
        if(percent >= 91) grade = "A1";
        else if(percent >= 81) grade = "A2";
        else if(percent >= 71) grade = "B1";
        else if(percent >= 33) grade = "C";
        
        document.getElementById('displayGrade').innerText = grade;
    }

    async function submitData() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = {
            admNo: document.getElementById('admNo').value,
            name: document.getElementById('stuName').value,
            roll: document.getElementById('rollNo').value,
            classSec: document.getElementById('classSec').value,
            totalMarks: document.getElementById('displayTotal').innerText,
            percentage: document.getElementById('displayPercent').innerText,
            grade: document.getElementById('displayGrade').innerText
        };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            alert("Record Saved!");
            location.reload();
        } catch(e) {
            alert("Error saving data.");
            btn.disabled = false;
        }
    }

    window.onload = init;
</script>
</body>
</html>
