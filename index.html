<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic School Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-section { background: var(--primary-color); color: white; padding: 20px; border-radius: 0 0 20px 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .subject-card { border-left: 5px solid #3498db; }
        .grade-badge { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="header-section text-center">
        <h1 id="schoolName">Loading School...</h1>
        <p id="academicYear">Year: --</p>
    </div>

    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Admission Number</label>
                <input type="text" id="admNo" class="form-control" placeholder="Enter & hit Search" onchange="searchStudent()">
            </div>
            <div class="col-md-4">
                <label class="form-label">Student Name</label>
                <input type="text" id="stuName" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label">Roll No</label>
                <input type="text" id="rollNo" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="form-label">Class/Sec</label>
                <select id="classSec" class="form-select">
                    <option value="8-A">8-A</option>
                    <option value="8-B">8-B</option>
                </select>
            </div>
        </div>
    </div>

    <div id="subjectsContainer" class="row">
        </div>

    <div class="card p-4 bg-light">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <h4>Total: <span id="displayTotal">0</span></h4>
            </div>
            <div class="col-md-4 text-center">
                <h4>Percentage: <span id="displayPercent">0%</span></h4>
            </div>
            <div class="col-md-4 text-center">
                <h4>Grade: <span id="displayGrade" class="badge bg-success grade-badge">-</span></h4>
            </div>
        </div>
        <button class="btn btn-primary btn-lg mt-4 w-100" onclick="submitData()">Save Record to Google Sheet</button>
    </div>
</div>

<script>
    // Paste your Google Web App URL here
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzkdDlNyo_7Bq9XdLVC3TXtu_cFzR4GAhFOEBEN7vgursFccT81wfox64YGfw_-GshjMg/exec"; 
    let configData = {};

    // 1. Fetch Config on Load
    async function init() {
        const res = await fetch(`${WEB_APP_URL}?action=getConfig`);
        const config = await res.json();
        configData = config;
        
        document.getElementById('schoolName').innerText = config.School_Name;
        document.getElementById('academicYear').innerText = `Session: ${config.Academic_Year}`;
        
        setupSubjects(config.Subjects, config.Competencies);
    }

    // 2. Setup Subject Inputs Dynamically
    function setupSubjects(subs, comps) {
        const container = document.getElementById('subjectsContainer');
        const subjects = subs.split(',');
        const competencies = comps.split(',');

        subjects.forEach(sub => {
            let compHTML = '';
            competencies.forEach(c => {
                compHTML += `
                    <div class="col-6 mb-2">
                        <label class="small text-muted">${c.trim()}</label>
                        <input type="number" class="form-control comp-input" data-sub="${sub}" placeholder="Marks">
                    </div>`;
            });

            container.innerHTML += `
                <div class="col-md-6">
                    <div class="card p-3 subject-card">
                        <h5>${sub.trim()}</h5>
                        <div class="row">
                            <div class="col-12 mb-2">
                                <label class="fw-bold text-primary">Theory Marks</label>
                                <input type="number" class="form-control theory-input" data-sub="${sub}" oninput="calculateResults()">
                            </div>
                            ${compHTML}
                        </div>
                    </div>
                </div>`;
        });
        
        // Add listeners to all inputs for calculation
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', calculateResults);
        });
    }

    // 3. Search Student (Auto-fill)
    async function searchStudent() {
        const id = document.getElementById('admNo').value;
        const res = await fetch(`${WEB_APP_URL}?action=search&id=${id}`);
        const data = await res.json();
        if(data.found) {
            document.getElementById('stuName').value = data.name;
            document.getElementById('rollNo').value = data.roll;
        }
    }

    // 4. Calculate Logic
    function calculateResults() {
        let totalObtained = 0;
        let totalPossible = 0;
        
        document.querySelectorAll('.theory-input, .comp-input').forEach(input => {
            totalObtained += Number(input.value) || 0;
            totalPossible += 100; // Adjust max marks as needed
        });

        let percent = (totalObtained / (document.querySelectorAll('.theory-input').length * 100)) * 100;
        document.getElementById('displayTotal').innerText = totalObtained;
        document.getElementById('displayPercent').innerText = percent.toFixed(2) + "%";
        
        // Grade Logic
        let grade = "E";
        if(percent >= 90) grade = "A1";
        else if(percent >= 80) grade = "A2";
        else if(percent >= 70) grade = "B1";
        else if(percent >= 33) grade = "C";
        
        document.getElementById('displayGrade').innerText = grade;
    }

    window.onload = init;
</script>
</body>
</html>
