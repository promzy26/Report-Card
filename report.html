<script>
    // Tera URL same rahega kyunki tune purane pe hi naya version dala hai
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwPpYH6_BGZhIa0O3Cu8keJxArC0jYxwdgQ-0shIzBHjfznjIxP6b6YuhKoSzewwmtC1g/exec";

    function getReport() {
        const id = document.getElementById('admNoSearch').value;
        if(!id) return alert("Please enter Admission Number");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('reportContent').style.display = 'none';
        document.getElementById('actionBtns').style.display = 'none';

        // DATABASE ERROR FIX: JSONP Bypass
        const script = document.createElement('script');
        // Hum callback=onSuccess bhej rahe hain
        script.src = `${WEB_APP_URL}?action=getReport&id=${encodeURIComponent(id)}&callback=onSuccess`;
        
        script.onerror = function() {
            document.getElementById('loader').style.display = 'none';
            alert("Connection Error! Check if Script is Deployed correctly.");
        };

        document.body.appendChild(script);
        document.body.removeChild(script); // Cleanup
    }

    // Ye function data aane par apne aap chalega
    function onSuccess(data) {
        document.getElementById('loader').style.display = 'none';
        if(data && data.found) {
            renderReport(data);
        } else {
            alert("Record Not Found! ID check karo.");
        }
    }

    function renderReport(data) {
        // Basic Details
        document.getElementById('rSchoolName').innerText = data.schoolName;
        document.getElementById('rSession').innerText = `SESSION: ${data.session}`;
        document.getElementById('rName').innerText = data.name;
        document.getElementById('rRoll').innerText = data.roll;
        document.getElementById('rAdm').innerText = document.getElementById('admNoSearch').value;
        document.getElementById('rClass').innerText = data.classSec;
        document.getElementById('rTotal').innerText = data.total;
        document.getElementById('rPercent').innerText = data.percent;
        document.getElementById('rGrade').innerText = data.grade;

        let subjects = data.subjects;
        if (typeof subjects === 'string') {
            try { subjects = JSON.parse(subjects); } catch(e) { subjects = []; }
        }

        // Filter Logic: Khali column chhupao, 0 dikhao
        let validComps = new Set();
        subjects.forEach(s => {
            if(s.competencies) {
                Object.keys(s.competencies).forEach(k => {
                    let val = s.competencies[k];
                    if(val !== "" && val !== null && val !== undefined) {
                        validComps.add(k);
                    }
                });
            }
        });

        const compList = Array.from(validComps);

        // Header Table (Horizontal)
        let headHTML = `<tr><th class="sub-name">Subjects</th><th>Theory</th>`;
        compList.forEach(c => headHTML += `<th>${c}</th>`);
        headHTML += `</tr>`;
        document.getElementById('marksHead').innerHTML = headHTML;

        // Body Table
        let bodyHTML = "";
        subjects.forEach(s => {
            bodyHTML += `<tr><td class="sub-name">${s.subject}</td><td>${s.theory || '0'}</td>`;
            compList.forEach(c => {
                // Agar 0 hai toh dikhayega, agar blank hai toh '-' dikhayega
                let val = (s.competencies && s.competencies[c] !== "" && s.competencies[c] !== null) ? s.competencies[c] : '-';
                bodyHTML += `<td>${val}</td>`;
            });
            bodyHTML += `</tr>`;
        });
        document.getElementById('marksBody').innerHTML = bodyHTML;

        // Display Report
        document.getElementById('reportContent').style.display = 'block';
        document.getElementById('actionBtns').style.display = 'block';
    }
</script>
