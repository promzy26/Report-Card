<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress Report | Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #1a2a6c; --accent: #b21f1f; --text-main: #2d3436; }
        body { background: #dfe6e9; font-family: 'Poppins', sans-serif; color: var(--text-main); padding: 20px; }
        
        /* Search Bar Styling */
        .search-container { max-width: 500px; margin: 0 auto 30px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-bottom: 4px solid var(--primary-dark); }
        .search-container h6 { font-weight: 700; color: var(--primary-dark); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* Report Card Paper Effect */
        .report-card { 
            background: white; max-width: 1100px; margin: auto; padding: 40px; 
            border-radius: 2px; box-shadow: 0 0 50px rgba(0,0,0,0.15); 
            position: relative; border-top: 8px solid var(--primary-dark);
            display: none; /* Initial Hidden */
        }
        
        /* Watermark */
        .report-card::before {
            content: "OFFICIAL"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 8rem; color: rgba(0,0,0,0.03); font-weight: 900; z-index: 0; pointer-events: none;
        }

        .header-section { text-align: center; margin-bottom: 30px; position: relative; z-index: 1; }
        .header-section h1 { font-weight: 800; font-size: 2.2rem; color: var(--primary-dark); margin-bottom: 5px; text-transform: uppercase; }
        .header-section p { font-size: 1.1rem; color: #636e72; font-weight: 500; }

        /* Student Info Grid */
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border: 1.5px solid #2d3436; margin-bottom: 30px; }
        .info-item { border: 0.5px solid #2d3436; padding: 12px 15px; display: flex; }
        .info-label { font-weight: 700; width: 140px; color: #000; text-transform: uppercase; font-size: 0.85rem; }
        .info-value { flex: 1; border-left: 1.5px solid #2d3436; padding-left: 15px; font-weight: 500; color: #2d3436; }

        /* Subjects Horizontal Grid */
        .subject-container { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .sub-box { 
            border: 1.5px solid #2d3436; width: calc(33.33% - 10px); 
            background: #fff; display: flex; flex-direction: column; transition: 0.3s;
        }
        .sub-box:hover { border-color: var(--accent); }
        .sub-name { 
            background: var(--primary-dark); color: white; padding: 8px; 
            font-weight: 700; text-align: center; font-size: 1rem; text-transform: uppercase;
        }
        .comp-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .comp-table td { padding: 6px 12px; border-bottom: 1px solid #dfe6e9; }
        .comp-table tr:last-child td { border-bottom: none; }
        .score-bg { background: #f9f9f9; font-weight: 700; text-align: center; border-left: 1.5px solid #2d3436; width: 60px; }

        /* Performance Summary */
        .summary-box { width: 100%; border: 1.5px solid #2d3436; border-collapse: collapse; margin-top: 20px; }
        .summary-box td { border: 1.5px solid #2d3436; padding: 15px; text-align: center; }
        .summary-title { background: #f2f2f2; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
        .summary-value { font-size: 1.2rem; font-weight: 800; color: var(--accent); }

        /* Signature Section */
        .sig-container { display: flex; margin-top: 40px; border: 1.5px solid #2d3436; }
        .sig-box { flex: 1; border-right: 1.5px solid #2d3436; padding: 60px 10px 15px; text-align: center; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .sig-box:last-child { border-right: none; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .report-card { box-shadow: none; border: 1.5px solid #000; width: 100%; padding: 20px; }
        }
        @media (max-width: 768px) { .sub-box { width: 100%; } .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container no-print">
    <div class="search-container text-center">
        <h6>Student Result Portal</h6>
        <div class="input-group">
            <input type="text" id="admNo" class="form-control form-control-lg" placeholder="Admission Number">
            <button class="btn btn-dark btn-lg" onclick="getReport()">View Result</button>
        </div>
    </div>
</div>

<div id="reportArea" class="report-card">
    <div class="header-section">
        <h1 id="sName">SCHOOL NAME</h1>
        <p>Annual Progress Report: <span id="sSession">2025-26</span></p>
        <div style="font-weight: bold; font-size: 1.2rem; border: 2px solid #000; display: inline-block; padding: 5px 20px;">
            ADM NO: <span id="sAdm">---</span>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item"><div class="info-label">Student Name</div><div class="info-value" id="rName">---</div></div>
        <div class="info-item"><div class="info-label">Roll Number</div><div class="info-value" id="rRoll">---</div></div>
        <div class="info-item"><div class="info-label">Class & Sec</div><div class="info-value" id="rClass">---</div></div>
        <div class="info-item"><div class="info-label">Attendance</div><div class="info-value">Regular</div></div>
    </div>

    <div id="subGrid" class="subject-container"></div>

    <table class="summary-box">
        <tr>
            <td class="summary-title">Marks Obtained</td><td class="summary-value" id="rObt">0</td>
            <td class="summary-title">Percentage</td><td class="summary-value" id="rPer">0%</td>
        </tr>
        <tr>
            <td class="summary-title">Total Max Marks</td><td class="summary-value" id="rMax">0</td>
            <td class="summary-title">Final Grade</td><td class="summary-value" id="rGrade">---</td>
        </tr>
    </table>

    <div class="sig-container">
        <div class="sig-box">Class Teacher</div>
        <div class="sig-box">Exam Controller</div>
        <div class="sig-box">Parent/Guardian</div>
        <div class="sig-box">Principal</div>
    </div>

    <div class="text-center mt-5 no-print">
        <button class="btn btn-primary btn-lg px-5 shadow" onclick="window.print()">Download as PDF</button>
    </div>
</div>

<script>
    // TERI NAYI DEPLOYMENT URL YAHAN DALNA
    const API_URL = "https://script.google.com/macros/s/AKfycbwPpYH6_BGZhIa0O3Cu8keJxArC0jYxwdgQ-0shIzBHjfznjIxP6b6YuhKoSzewwmtC1g/exec"; 

    async function getReport() {
        const id = document.getElementById('admNo').value;
        if(!id) return alert("Admission Number Enter Karein!");
        
        const btn = document.querySelector('.no-print button');
        btn.innerText = "Fetching..."; btn.disabled = true;

        try {
            const res = await fetch(`${API_URL}?action=getReport&id=${id}`);
            const data = await res.json();

            if(data.found) {
                document.getElementById('reportArea').style.display = 'block';
                document.getElementById('sName').innerText = data.schoolName;
                document.getElementById('sSession').innerText = data.session;
                document.getElementById('sAdm').innerText = id;
                document.getElementById('rName').innerText = data.name;
                document.getElementById('rRoll').innerText = data.roll;
                document.getElementById('rClass').innerText = data.classSec;
                
                document.getElementById('rObt').innerText = data.total.split('/')[0];
                document.getElementById('rMax').innerText = data.total.split('/')[1];
                document.getElementById('rPer').innerText = data.percent;
                document.getElementById('rGrade').innerText = data.grade;

                const grid = document.getElementById('subGrid');
                grid.innerHTML = "";

                data.subjects.forEach(s => {
                    let tMarks = Number(s.theory || 0);
                    let cRows = "";
                    let totalS = tMarks;

                    if(s.competencies) {
                        Object.entries(s.competencies).forEach(([k, v]) => {
                            totalS += Number(v || 0);
                            cRows += `<tr><td>${k}</td><td class="score-bg">${v}</td></tr>`;
                        });
                    }

                    grid.innerHTML += `
                        <div class="sub-box">
                            <div class="sub-name">${s.subject} : ${totalS}</div>
                            <table class="comp-table">
                                <tr style="background:#f1f2f6"><td>Theory</td><td class="score-bg">${tMarks}</td></tr>
                                ${cRows}
                            </table>
                        </div>`;
                });
                window.scrollTo({top: 500, behavior: 'smooth'});
            } else { alert("Data nahi mila! Adm No check karein."); }
        } catch(e) { alert("Server Error! Deployment URL Check Karein."); }
        finally { btn.innerText = "View Result"; btn.disabled = false; }
    }
</script>
</body>
</html>
