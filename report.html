<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Report Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; }
        body { background:#f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .no-print-zone { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Report Card Styling */
        #reportCard { 
            background: white; padding: 40px; border: 2px solid #000; 
            margin: 30px auto; max-width: 1100px; display: none; 
            min-height: 600px;
        }
        .report-header { border-bottom: 4px double var(--primary); margin-bottom: 25px; padding-bottom: 10px; }
        
        /* Dynamic Table - Horizontal */
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { border: 1.5px solid #000; padding: 10px; text-align: center; font-size: 14px; }
        .report-table th { background: #f8f9fa; text-transform: uppercase; }
        .subject-name { text-align: left !important; font-weight: bold; background: #fafafa; width: 200px; }

        .footer-summary { background: #fdfdfd; border: 1px solid #000; padding: 15px; margin-top: 20px; font-weight: bold; }
        
        @media print {
            .no-print-zone, .btn-print-box { display: none !important; }
            #reportCard { display: block !important; border: none; width: 100%; margin: 0; padding: 0; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="no-print-zone text-center">
    <h2 class="mb-4">Student Result Portal</h2>
    <div class="input-group mb-3">
        <input type="text" id="admNo" class="form-control form-control-lg" placeholder="Enter Admission Number">
        <button class="btn btn-primary btn-lg" onclick="fetchReport()">Search Result</button>
    </div>
    <div id="status"></div>
</div>

<div id="reportCard">
    <div class="report-header text-center">
        <h1 id="sName" style="font-weight: 800; color: var(--primary);">-- SCHOOL NAME --</h1>
        <h5 id="sSession">Session: 2024-25</h5>
        <h4 class="mt-3">PROGRESS REPORT CARD</h4>
    </div>

    <div class="row mb-4" style="font-size: 1.1rem;">
        <div class="col-6">
            <strong>Student Name:</strong> <span id="r_name"></span><br>
            <strong>Roll Number:</strong> <span id="r_roll"></span>
        </div>
        <div class="col-6 text-end">
            <strong>Admission No:</strong> <span id="r_adm"></span><br>
            <strong>Class & Section:</strong> <span id="r_class"></span>
        </div>
    </div>

    <div class="table-responsive">
        <table class="report-table">
            <thead id="h_head"></thead>
            <tbody id="h_body"></tbody>
        </table>
    </div>

    <div class="footer-summary">
        <div class="row text-center">
            <div class="col-4">TOTAL MARKS: <span id="r_total"></span></div>
            <div class="col-4">PERCENTAGE: <span id="r_percent"></span></div>
            <div class="col-4">GRADE: <span id="r_grade"></span></div>
        </div>
    </div>

    <div class="row mt-5 pt-5 text-center">
        <div class="col-4"><p>________________<br>Class Teacher</p></div>
        <div class="col-4"></div>
        <div class="col-4"><p>________________<br>Principal</p></div>
    </div>
</div>

<div class="text-center mt-4 btn-print-box" style="display:none;">
    <button class="btn btn-dark btn-lg px-5" onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwPpYH6_BGZhIa0O3Cu8keJxArC0jYxwdgQ-0shIzBHjfznjIxP6b6YuhKoSzewwmtC1g/exec";

    async function fetchReport() {
        const id = document.getElementById('admNo').value;
        if(!id) return alert("Please enter Admission Number");
        
        document.getElementById('status').innerHTML = "Searching Database...";
        document.getElementById('reportCard').style.display = 'none';

        try {
            const res = await fetch(`${API_URL}?action=getReport&id=${id}`);
            const data = await res.json();
            
            if(data.found) {
                renderData(data, id);
                document.getElementById('status').innerHTML = "";
            } else {
                document.getElementById('status').innerHTML = "<b style='color:red;'>Record Not Found!</b>";
            }
        } catch(e) {
            document.getElementById('status').innerHTML = "<b style='color:red;'>Database Error! Check Deployment.</b>";
        }
    }

    function renderData(data, id) {
        document.getElementById('sName').innerText = data.schoolName;
        document.getElementById('sSession').innerText = `Session: ${data.session}`;
        document.getElementById('r_name').innerText = data.name;
        document.getElementById('r_roll').innerText = data.roll;
        document.getElementById('r_adm').innerText = id;
        document.getElementById('r_class').innerText = data.classSec;
        document.getElementById('r_total').innerText = data.total;
        document.getElementById('r_percent').innerText = data.percent;
        document.getElementById('r_grade').innerText = data.grade;

        let subs = data.subjects;
        if (typeof subs === 'string') subs = JSON.parse(subs);

        // Dynamic Columns Filter (Skip null, show 0)
        let activeComps = new Set();
        subs.forEach(s => {
            if(s.competencies) {
                Object.keys(s.competencies).forEach(c => {
                    if(s.competencies[c] !== "" && s.competencies[c] !== null && s.competencies[c] !== undefined) {
                        activeComps.add(c);
                    }
                });
            }
        });

        const compList = Array.from(activeComps);

        // Build Table Header
        let headHtml = `<tr><th class="subject-name">Subject</th><th>Theory</th>`;
        compList.forEach(c => headHtml += `<th>${c}</th>`);
        headHtml += `</tr>`;
        document.getElementById('h_head').innerHTML = headHtml;

        // Build Table Body
        let bodyHtml = "";
        subs.forEach(s => {
            bodyHtml += `<tr><td class="subject-name">${s.subject}</td><td>${s.theory || '0'}</td>`;
            compList.forEach(c => {
                let val = (s.competencies && (s.competencies[c] !== "" && s.competencies[c] !== null)) ? s.competencies[c] : '-';
                bodyHtml += `<td>${val}</td>`;
            });
            bodyHtml += `</tr>`;
        });
        document.getElementById('h_body').innerHTML = bodyHtml;

        document.getElementById('reportCard').style.display = 'block';
        document.querySelector('.btn-print-box').style.display = 'block';
    }
</script>
</body>
</html>
